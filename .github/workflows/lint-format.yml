name: autofix.ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run lint/format scripts
        uses: area44/workflows/lint-format@d630b2d72e8ec6d64a85141763062ee5ec2d7785 # v5.0.0
